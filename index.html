<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Invito GymTracker</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#0a0a0a;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px}.card{width:100%;max-width:420px;background:#171717;border:1px solid #3b3b36;border-radius:20px;padding:24px;text-align:center;box-shadow:0 20px 60px #0008}.logo{width:54px;height:54px;margin:0 auto 14px;border-radius:16px;background:#e8ff00;color:#000;display:grid;place-items:center;font-weight:1000;font-size:20px}h1{font-size:26px;margin:0 0 8px}p{color:#aaa;line-height:1.5}.open{display:block;background:#e8ff00;color:#000;text-decoration:none;font-weight:900;border-radius:12px;padding:15px;margin:20px 0}.fallback{display:none}code{display:block;word-break:break-all;background:#0f0f0f;border-radius:10px;padding:11px;color:#e8ff00;font-size:11px}.error{color:#f87171}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">GT</div>
    <h1>Invito GymTracker</h1>
    <p id="message">Il tuo Personal Trainer ti ha invitato a collegarti.</p>
    <a id="open" class="open" href="#">APRI GYMTRACKER</a>
    <div id="fallback" class="fallback">
      <p>Se l'app non si apre, copia questo codice in Profilo → Collegati al tuo PT:</p>
      <code id="code"></code>
    </div>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get("token") || "";
    const valid = /^[a-f0-9]{64}$/i.test(token);
    const open = document.getElementById("open");
    const message = document.getElementById("message");
    if (!valid) {
      message.textContent = "Questo invito non è valido.";
      message.className = "error";
      open.style.display = "none";
    } else {
      open.href = "gymtracker://pt-invite?token=" + encodeURIComponent(token);
      document.getElementById("code").textContent = token;
      document.getElementById("fallback").style.display = "block";
    }
  </script>
</body>
</html>
